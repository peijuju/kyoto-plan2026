name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 或者是 master，看你的預設分支名稱是什麼
  workflow_dispatch: # 允許手動點擊按鈕觸發部署

# 設定權限，允許此 workflow 發布至 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 限制同時間只有一個部署流程在跑，避免部署衝突
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_APP_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 預設打包出來的靜態資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
